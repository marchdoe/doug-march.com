<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Green outer ring -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="#5CBE4A" stroke-width="4"/>
  <!-- Blue inner circle / pin center -->
  <circle cx="50" cy="50" r="10" fill="#4A8FD4"/>
  <!-- Dart/compass crosshairs -->
  <line x1="50" y1="6" x2="50" y2="94" stroke="#4A8FD4" stroke-width="2" opacity="0.4"/>
  <line x1="6" y1="50" x2="94" y2="50" stroke="#4A8FD4" stroke-width="2" opacity="0.4"/>
  <!-- Pin point -->
  <circle cx="50" cy="50" r="4" fill="#5CBE4A"/>
</svg>
