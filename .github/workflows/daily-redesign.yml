name: Daily Redesign

on:
  schedule:
    - cron: '0 10 * * *'  # 5am EST (UTC-5) / 6am EDT (UTC-4) — runs at 10am UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — generate and verify build but do not commit'
        type: boolean
        default: false

# Prevent overlapping runs (cron + manual trigger) that would race on
# git push to main. Queue instead of cancelling — we never want to
# abort a successful run mid-commit.
concurrency:
  group: daily-redesign
  cancel-in-progress: false

jobs:
  redesign:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
      issues: write  # for failure notification issues

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Install Claude CLI
        # Pinned to 2.1.92 — versions 2.1.94+ caused the unified-designer
        # agent to produce 0KB output for large (56KB) prompts in CI.
        # See PR #40 for investigation. Bump after verifying in a test run.
        run: npm install -g @anthropic-ai/claude-code@2.1.92

      - name: Collect signals
        env:
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          PRODUCT_HUNT_TOKEN: ${{ secrets.PRODUCT_HUNT_TOKEN }}
        run: node scripts/collect-signals.js

      - name: Interpret signals
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/interpret-signals.js

      - name: Run daily redesign
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: node scripts/daily-redesign.js

      - name: Push changes
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TODAY=$(date -u +%Y-%m-%d)
          # Stage only today's completed build — explicitly exclude
          # build-pre-* (snapshot temp dirs) and build-failed-* (failure
          # diagnostic dirs) so they never leak into main. Uses explicit
          # paths instead of archive/ so other dates' dirs aren't touched.
          git add "archive/$TODAY/archetype.txt" 2>/dev/null || true
          git add "archive/$TODAY/brief.md" 2>/dev/null || true
          # Only stage numeric timestamp build dirs (build-\d+), not build-pre-* or build-failed-*
          for d in archive/$TODAY/build-[0-9]*; do
            [ -d "$d" ] && git add "$d"
          done
          git add elements/ app/components/ app/routes/ public/archive/ signals/today.references.md
          git diff --cached --quiet || git commit -m "chore: daily redesign $TODAY"
          # Retry push up to 3 times in case of concurrent pushes to main
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "push attempt $i failed, retrying in 10s..."
            sleep 10
          done

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Daily redesign failed — ${new Date().toISOString().slice(0, 10)}`
            const body = [
              `The daily redesign pipeline failed.`,
              ``,
              `**Run:** [${context.runId}](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              `**Trigger:** ${context.eventName}`,
              `**Commit:** ${context.sha.slice(0, 7)}`,
              ``,
              `Check the run logs for the failure reason. If a trace was saved, find it under \`archive/$(date -u +%Y-%m-%d)/build-failed-*/trace.json\`.`,
            ].join('\n')
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['pipeline-failure'],
            })
