name: Daily Redesign

on:
  schedule:
    - cron: '0 10 * * *'  # 5am EST (UTC-5) / 6am EDT (UTC-4) — runs at 10am UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — generate and verify build but do not commit'
        type: boolean
        default: false

jobs:
  redesign:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Collect signals
        env:
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          PRODUCT_HUNT_TOKEN: ${{ secrets.PRODUCT_HUNT_TOKEN }}
        run: node scripts/collect-signals.js

      - name: Interpret signals
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/interpret-signals.js

      - name: Run daily redesign
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: node scripts/daily-redesign.js

      - name: Push changes
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add archive/ elements/ app/components/ app/routes/ public/archive/ signals/today.references.md
          git diff --cached --quiet || git commit -m "chore: daily redesign $(date +%Y-%m-%d)"
          git pull --rebase origin main
          git push origin main
